<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>chess.com.puter</title>
  <link rel="stylesheet" href="assets/chessground.base.css">
  <link rel="stylesheet" href="assets/chessground.brown.css">
  <link rel="stylesheet" href="assets/chessground.cburnett.css">
  <link rel="stylesheet" href="panel.css">
</head>
<body>
  <div id="app">
    <!-- Header: shown when a game is loaded -->
    <header id="header" class="hidden">
      <span id="header-book" class="header-book hidden"></span>
      <a href="#" id="btn-close-game" class="header-link header-close">&times; Close game</a>
    </header>

    <!-- Lobby: shown when no game is loaded -->
    <section id="lobby">
      <div class="lobby-title">Free the fish!</div>
      <div class="lobby-buttons">
        <button class="lobby-btn" id="lobby-sandbox">Sandbox</button>
        <button class="lobby-btn" id="lobby-paste">Paste PGN</button>
        <div class="lobby-import-row">
          <button class="lobby-btn lobby-import" id="lobby-import" disabled>Import game from current page</button>
          <button class="lobby-refresh" id="lobby-refresh" title="Scan page for games">&#x21bb;</button>
          <span class="lobby-spinner hidden" id="lobby-spinner"></span>
        </div>
      </div>
      <div class="lobby-status" id="lobby-status"></div>
      <div id="pgn-input-area" class="hidden">
        <textarea id="pgn-textarea" placeholder="Paste PGN here..." rows="8"></textarea>
        <div class="pgn-input-actions">
          <button class="ctrl-btn" id="pgn-analyze">Analyze</button>
          <button class="ctrl-btn" id="pgn-cancel">Cancel</button>
          <span id="pgn-warning" class="pgn-warning hidden"></span>
        </div>
      </div>
    </section>

    <!-- Analysis mode (completed games) -->
    <section id="analysis-section" class="hidden">
      <div id="progress-container" class="hidden">
        <div class="progress-track">
          <div class="progress-fill" id="progress-bar"></div>
        </div>
        <span class="progress-text" id="progress-text">Analyzing...</span>
      </div>
      <div id="analysis-summary" class="hidden"></div>
      <div class="board-row">
        <div id="eval-bar"></div>
        <div id="board-container"></div>
      </div>
      <div id="move-list"></div>
      <div id="control-bar"></div>
      <div id="engine-lines"></div>
      <div id="eval-chart"></div>
    </section>

    <!-- Live helper mode (active games) -->
    <section id="live-section" class="hidden"></section>

    <footer id="status-bar">
      <span class="status-text">Free the fish!</span>
    </footer>
  </div>
  <script src="panel.js"></script>
</body>
</html>
